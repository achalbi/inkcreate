<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Inkcreate Mobile Shell</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d0d0d;
        color: #f5f2eb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(196, 172, 122, 0.22), transparent 38%),
          linear-gradient(180deg, #15120e 0%, #090909 100%);
      }

      main {
        width: min(32rem, calc(100vw - 2rem));
        padding: 1.5rem;
        border: 1px solid rgba(245, 242, 235, 0.12);
        border-radius: 1.25rem;
        background: rgba(14, 14, 14, 0.9);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.8rem;
      }

      p {
        margin: 0 0 0.9rem;
        line-height: 1.5;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        padding: 0.14rem 0.32rem;
        border-radius: 0.4rem;
        background: rgba(245, 242, 235, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Inkcreate Mobile Shell</h1>
      <p>This Capacitor app is ready, but no remote app URL is configured yet.</p>
      <p>Set <code>INKCREATE_APP_URL</code> before running <code>npx cap sync android</code>.</p>
      <p>Examples: <code>http://10.0.2.2:3000</code> for the Android emulator, or your deployed app URL.</p>
    </main>
  </body>
</html>
