name: inkcreate_mobile_shell
description: Flutter mobile shell for the existing InkCreate Rails web app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.2.1
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.10.4
  webview_flutter_wkwebview: ^3.23.1
  connectivity_plus: ^7.1.1
  device_info_plus: ^13.0.0
  permission_handler: ^12.0.1
  package_info_plus: ^10.0.0
  image_picker: ^1.2.1
  mobile_scanner: ^7.2.0
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_language_id: ^0.13.1
  google_mlkit_translation: ^0.13.1
  google_mlkit_entity_extraction: ^0.15.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
