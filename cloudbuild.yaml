# Cloud Build deploys Inkcreate to Cloud Run.
# The default pattern supports:
# - a public API service
# - an optional worker service for Cloud Tasks callbacks
# - a migration job
#
# Before using this pipeline, create the runtime service account, the required
# Secret Manager entries, and optionally the Cloud Tasks invoker service account
# documented in:
# docs/cloud-run-setup.md

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Ensure Artifact Registry
    entrypoint: /bin/bash
    args:
      - -c
      - |
        set -euo pipefail
        if ! gcloud artifacts repositories describe "${_AR_REPOSITORY}" --location="${_DEPLOY_REGION}" >/dev/null 2>&1; then
          gcloud artifacts repositories create "${_AR_REPOSITORY}" \
            --location="${_DEPLOY_REGION}" \
            --repository-format=docker \
            --description="Inkcreate container images"
        fi
        gcloud auth configure-docker "${_AR_HOSTNAME}" --quiet

  - name: gcr.io/cloud-builders/docker
    id: Pull
    entrypoint: /bin/bash
    args:
      - -c
      - |
        docker pull $_AR_HOSTNAME/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest || exit 0

  - name: gcr.io/cloud-builders/docker
    id: Build
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --cache-from=$_AR_HOSTNAME/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest
      - -t
      - $_AR_HOSTNAME/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - -t
      - $_AR_HOSTNAME/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest
      - -f
      - Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - --all-tags
      - $_AR_HOSTNAME/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Migrate
    entrypoint: /bin/bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE_URI="$_AR_HOSTNAME/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA"
        SERVICE_ACCOUNT_ARGS=()
        SECRET_BINDINGS="DATABASE_URL=${_DATABASE_URL_SECRET}:latest,SECRET_KEY_BASE=${_SECRET_KEY_BASE_SECRET}:latest,GOOGLE_OAUTH_CLIENT_ID=${_GOOGLE_OAUTH_CLIENT_ID_SECRET}:latest,GOOGLE_OAUTH_CLIENT_SECRET=${_GOOGLE_OAUTH_CLIENT_SECRET_SECRET}:latest,ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${_ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY_SECRET}:latest,ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${_ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY_SECRET}:latest,ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${_ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT_SECRET}:latest"

        if [ -n "${_RUNTIME_SERVICE_ACCOUNT}" ]; then
          SERVICE_ACCOUNT_ARGS+=(--service-account="${_RUNTIME_SERVICE_ACCOUNT}")
        fi

        if [ -n "${_VAPID_PUBLIC_KEY_SECRET}" ] && [ -n "${_VAPID_PRIVATE_KEY_SECRET}" ] && [ -n "${_VAPID_SUBJECT_SECRET}" ]; then
          SECRET_BINDINGS="$${SECRET_BINDINGS},VAPID_PUBLIC_KEY=${_VAPID_PUBLIC_KEY_SECRET}:latest,VAPID_PRIVATE_KEY=${_VAPID_PRIVATE_KEY_SECRET}:latest,VAPID_SUBJECT=${_VAPID_SUBJECT_SECRET}:latest"
        fi

        gcloud run jobs deploy "${_MIGRATE_JOB}" \
          --image="$${IMAGE_URI}" \
          --region="${_DEPLOY_REGION}" \
          --command=bundle \
          --args=exec,rails,db:migrate \
          --max-retries=0 \
          --parallelism=1 \
          --tasks=1 \
          --task-timeout=900s \
          --set-env-vars="RAILS_ENV=production,JOB_BACKEND=cloud_tasks,RAILS_LOG_LEVEL=${_RAILS_LOG_LEVEL},FORCE_SSL=${_FORCE_SSL},RAILS_SERVE_STATIC_FILES=${_RAILS_SERVE_STATIC_FILES},ACTIVE_STORAGE_SERVICE=${_ACTIVE_STORAGE_SERVICE},GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_DEPLOY_REGION},GCS_UPLOAD_BUCKET=${_GCS_UPLOAD_BUCKET},OCR_PROVIDER=${_OCR_PROVIDER},OCR_LANGUAGE=${_OCR_LANGUAGE},DEVISE_MAILER_SENDER=${_DEVISE_MAILER_SENDER},GOOGLE_DRIVE_REDIRECT_URI=${_GOOGLE_DRIVE_REDIRECT_URI},RELEASE_SHA=$COMMIT_SHA" \
          --set-secrets="$${SECRET_BINDINGS}" \
          "$${SERVICE_ACCOUNT_ARGS[@]}" \
          --quiet

        gcloud run jobs execute "${_MIGRATE_JOB}" \
          --region="${_DEPLOY_REGION}" \
          --wait \
          --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Ensure Cloud Tasks Queues
    entrypoint: /bin/bash
    args:
      - -c
      - |
        set -euo pipefail

        ensure_queue() {
          local queue_name="$1"

          if ! gcloud tasks queues describe "$${queue_name}" --location="${_DEPLOY_REGION}" >/dev/null 2>&1; then
            gcloud tasks queues create "$${queue_name}" \
              --location="${_DEPLOY_REGION}" \
              --quiet
          fi
        }

        ensure_queue "${_CLOUD_TASKS_OCR_QUEUE}"
        ensure_queue "${_CLOUD_TASKS_DRIVE_QUEUE}"
        ensure_queue "${_CLOUD_TASKS_REMINDERS_QUEUE}"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy Worker Bootstrap
    entrypoint: /bin/bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE_URI="$_AR_HOSTNAME/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA"
        LABELS="managed-by=gcp-cloud-build-deploy-cloud-run,gcb-trigger-id=${_TRIGGER_ID},gcb-trigger-region=$LOCATION,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID"
        CLOUD_TASKS_HEADER_AUTH_ENABLED=false
        CLOUD_TASKS_AUTH_MODE=token
        EFFECTIVE_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL=
        SERVICE_ACCOUNT_ARGS=()
        SECRET_BINDINGS="INTERNAL_TASK_TOKEN=${_INTERNAL_TASK_TOKEN_SECRET}:latest,DATABASE_URL=${_DATABASE_URL_SECRET}:latest,SECRET_KEY_BASE=${_SECRET_KEY_BASE_SECRET}:latest,GOOGLE_OAUTH_CLIENT_ID=${_GOOGLE_OAUTH_CLIENT_ID_SECRET}:latest,GOOGLE_OAUTH_CLIENT_SECRET=${_GOOGLE_OAUTH_CLIENT_SECRET_SECRET}:latest,ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${_ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY_SECRET}:latest,ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${_ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY_SECRET}:latest,ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${_ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT_SECRET}:latest"

        if [ -n "${_RUNTIME_SERVICE_ACCOUNT}" ]; then
          SERVICE_ACCOUNT_ARGS+=(--service-account="${_RUNTIME_SERVICE_ACCOUNT}")
        fi

        if [ -n "${_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL}" ] && [ "${_WORKER_SERVICE}" != "${_API_SERVICE}" ]; then
          CLOUD_TASKS_HEADER_AUTH_ENABLED=true
          CLOUD_TASKS_AUTH_MODE=oidc
          EFFECTIVE_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL="${_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL}"
        fi

        if [ -n "${_VAPID_PUBLIC_KEY_SECRET}" ] && [ -n "${_VAPID_PRIVATE_KEY_SECRET}" ] && [ -n "${_VAPID_SUBJECT_SECRET}" ]; then
          SECRET_BINDINGS="$${SECRET_BINDINGS},VAPID_PUBLIC_KEY=${_VAPID_PUBLIC_KEY_SECRET}:latest,VAPID_PRIVATE_KEY=${_VAPID_PRIVATE_KEY_SECRET}:latest,VAPID_SUBJECT=${_VAPID_SUBJECT_SECRET}:latest"
        fi

        if [ -n "${_SENTRY_DSN_SECRET}" ]; then
          SECRET_BINDINGS="$${SECRET_BINDINGS},SENTRY_DSN=${_SENTRY_DSN_SECRET}:latest"
        fi

        SECRET_ARGS=(--set-secrets="$${SECRET_BINDINGS}")

        # Bootstrap the worker service before its stable URL is known. The
        # later update step replaces this placeholder with the real service URL.
        gcloud run deploy "${_WORKER_SERVICE}" \
          --image="$${IMAGE_URI}" \
          --region="${_DEPLOY_REGION}" \
          --platform=managed \
          --no-allow-unauthenticated \
          --concurrency="${_WORKER_CONCURRENCY}" \
          --cpu="${_WORKER_CPU}" \
          --memory="${_WORKER_MEMORY}" \
          --timeout="${_WORKER_TIMEOUT}" \
          --min-instances="${_WORKER_MIN_INSTANCES}" \
          --max-instances="${_WORKER_MAX_INSTANCES}" \
          --set-env-vars="RAILS_ENV=production,JOB_BACKEND=cloud_tasks,RAILS_LOG_LEVEL=${_RAILS_LOG_LEVEL},FORCE_SSL=${_FORCE_SSL},RAILS_SERVE_STATIC_FILES=${_RAILS_SERVE_STATIC_FILES},ACTIVE_STORAGE_SERVICE=${_ACTIVE_STORAGE_SERVICE},GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_DEPLOY_REGION},GCS_UPLOAD_BUCKET=${_GCS_UPLOAD_BUCKET},OCR_PROVIDER=${_OCR_PROVIDER},OCR_LANGUAGE=${_OCR_LANGUAGE},DEVISE_MAILER_SENDER=${_DEVISE_MAILER_SENDER},GOOGLE_DRIVE_REDIRECT_URI=${_GOOGLE_DRIVE_REDIRECT_URI},CLOUD_TASKS_OCR_QUEUE=${_CLOUD_TASKS_OCR_QUEUE},CLOUD_TASKS_DRIVE_QUEUE=${_CLOUD_TASKS_DRIVE_QUEUE},CLOUD_TASKS_REMINDERS_QUEUE=${_CLOUD_TASKS_REMINDERS_QUEUE},CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL=$${EFFECTIVE_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL},CLOUD_TASKS_AUTH_MODE=$${CLOUD_TASKS_AUTH_MODE},CLOUD_TASKS_HEADER_AUTH_ENABLED=$${CLOUD_TASKS_HEADER_AUTH_ENABLED},WORKER_BASE_URL=https://placeholder.invalid,RELEASE_SHA=$COMMIT_SHA" \
          "$${SECRET_ARGS[@]}" \
          --update-labels="$${LABELS}" \
          "$${SERVICE_ACCOUNT_ARGS[@]}" \
          --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Grant Cloud Tasks Service Account User
    entrypoint: /bin/bash
    args:
      - -c
      - |
        set -euo pipefail

        grant_output="$(mktemp)"
        cleanup() {
          rm -f "$${grant_output}"
        }
        trap cleanup EXIT

        if [ -n "${_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL}" ] && [ -n "${_RUNTIME_SERVICE_ACCOUNT}" ]; then
          if ! gcloud iam service-accounts add-iam-policy-binding "${_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL}" \
            --member="serviceAccount:${_RUNTIME_SERVICE_ACCOUNT}" \
            --role="roles/iam.serviceAccountUser" \
            --quiet >"$${grant_output}" 2>&1; then
            cat "$${grant_output}" >&2

            if grep -Eq "PERMISSION_DENIED|IAM_PERMISSION_DENIED" "$${grant_output}"; then
              echo "WARNING: Skipping automatic roles/iam.serviceAccountUser grant because the Cloud Build caller cannot update service-account IAM policies." >&2
              echo "WARNING: Grant serviceAccount:${_RUNTIME_SERVICE_ACCOUNT} access to actAs ${_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL} manually, or rerun with a build service account that has iam.serviceAccounts.setIamPolicy." >&2
            else
              exit 1
            fi
          else
            cat "$${grant_output}"
          fi
        fi

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Resolve Worker URL
    entrypoint: /bin/bash
    args:
      - -c
      - |
        set -euo pipefail
        WORKER_URL="$(gcloud run services describe "${_WORKER_SERVICE}" --region="${_DEPLOY_REGION}" --format='value(status.url)')"
        printf '%s' "$${WORKER_URL}" > /workspace/worker_url.txt
        echo "Resolved worker URL: $${WORKER_URL}"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy Worker
    entrypoint: /bin/bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE_URI="$_AR_HOSTNAME/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA"
        WORKER_URL="$(cat /workspace/worker_url.txt)"
        LABELS="managed-by=gcp-cloud-build-deploy-cloud-run,gcb-trigger-id=${_TRIGGER_ID},gcb-trigger-region=$LOCATION,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID"
        CLOUD_TASKS_HEADER_AUTH_ENABLED=false
        CLOUD_TASKS_AUTH_MODE=token
        EFFECTIVE_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL=
        SERVICE_ACCOUNT_ARGS=()
        SECRET_BINDINGS="INTERNAL_TASK_TOKEN=${_INTERNAL_TASK_TOKEN_SECRET}:latest,DATABASE_URL=${_DATABASE_URL_SECRET}:latest,SECRET_KEY_BASE=${_SECRET_KEY_BASE_SECRET}:latest,GOOGLE_OAUTH_CLIENT_ID=${_GOOGLE_OAUTH_CLIENT_ID_SECRET}:latest,GOOGLE_OAUTH_CLIENT_SECRET=${_GOOGLE_OAUTH_CLIENT_SECRET_SECRET}:latest,ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${_ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY_SECRET}:latest,ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${_ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY_SECRET}:latest,ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${_ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT_SECRET}:latest"

        if [ -n "${_RUNTIME_SERVICE_ACCOUNT}" ]; then
          SERVICE_ACCOUNT_ARGS+=(--service-account="${_RUNTIME_SERVICE_ACCOUNT}")
        fi

        if [ -n "${_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL}" ] && [ "${_WORKER_SERVICE}" != "${_API_SERVICE}" ]; then
          CLOUD_TASKS_HEADER_AUTH_ENABLED=true
          CLOUD_TASKS_AUTH_MODE=oidc
          EFFECTIVE_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL="${_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL}"
        fi

        if [ -n "${_VAPID_PUBLIC_KEY_SECRET}" ] && [ -n "${_VAPID_PRIVATE_KEY_SECRET}" ] && [ -n "${_VAPID_SUBJECT_SECRET}" ]; then
          SECRET_BINDINGS="$${SECRET_BINDINGS},VAPID_PUBLIC_KEY=${_VAPID_PUBLIC_KEY_SECRET}:latest,VAPID_PRIVATE_KEY=${_VAPID_PRIVATE_KEY_SECRET}:latest,VAPID_SUBJECT=${_VAPID_SUBJECT_SECRET}:latest"
        fi

        if [ -n "${_SENTRY_DSN_SECRET}" ]; then
          SECRET_BINDINGS="$${SECRET_BINDINGS},SENTRY_DSN=${_SENTRY_DSN_SECRET}:latest"
        fi

        SECRET_ARGS=(--set-secrets="$${SECRET_BINDINGS}")

        gcloud run services update "${_WORKER_SERVICE}" \
          --image="$${IMAGE_URI}" \
          --region="${_DEPLOY_REGION}" \
          --platform=managed \
          --concurrency="${_WORKER_CONCURRENCY}" \
          --cpu="${_WORKER_CPU}" \
          --memory="${_WORKER_MEMORY}" \
          --timeout="${_WORKER_TIMEOUT}" \
          --min-instances="${_WORKER_MIN_INSTANCES}" \
          --max-instances="${_WORKER_MAX_INSTANCES}" \
          --set-env-vars="RAILS_ENV=production,JOB_BACKEND=cloud_tasks,RAILS_LOG_LEVEL=${_RAILS_LOG_LEVEL},FORCE_SSL=${_FORCE_SSL},RAILS_SERVE_STATIC_FILES=${_RAILS_SERVE_STATIC_FILES},ACTIVE_STORAGE_SERVICE=${_ACTIVE_STORAGE_SERVICE},GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_DEPLOY_REGION},GCS_UPLOAD_BUCKET=${_GCS_UPLOAD_BUCKET},OCR_PROVIDER=${_OCR_PROVIDER},OCR_LANGUAGE=${_OCR_LANGUAGE},DEVISE_MAILER_SENDER=${_DEVISE_MAILER_SENDER},GOOGLE_DRIVE_REDIRECT_URI=${_GOOGLE_DRIVE_REDIRECT_URI},CLOUD_TASKS_OCR_QUEUE=${_CLOUD_TASKS_OCR_QUEUE},CLOUD_TASKS_DRIVE_QUEUE=${_CLOUD_TASKS_DRIVE_QUEUE},CLOUD_TASKS_REMINDERS_QUEUE=${_CLOUD_TASKS_REMINDERS_QUEUE},CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL=$${EFFECTIVE_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL},CLOUD_TASKS_AUTH_MODE=$${CLOUD_TASKS_AUTH_MODE},CLOUD_TASKS_HEADER_AUTH_ENABLED=$${CLOUD_TASKS_HEADER_AUTH_ENABLED},WORKER_BASE_URL=$${WORKER_URL},RELEASE_SHA=$COMMIT_SHA" \
          "$${SECRET_ARGS[@]}" \
          --update-labels="$${LABELS}" \
          "$${SERVICE_ACCOUNT_ARGS[@]}" \
          --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Grant Worker Invoker
    entrypoint: /bin/bash
    args:
      - -c
      - |
        set -euo pipefail

        grant_output="$(mktemp)"
        cleanup() {
          rm -f "$${grant_output}"
        }
        trap cleanup EXIT

        if [ -n "${_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL}" ] && [ "${_WORKER_SERVICE}" != "${_API_SERVICE}" ]; then
          if ! gcloud run services add-iam-policy-binding "${_WORKER_SERVICE}" \
            --project="$PROJECT_ID" \
            --region="${_DEPLOY_REGION}" \
            --member="serviceAccount:${_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL}" \
            --role="roles/run.invoker" \
            --quiet >"$${grant_output}" 2>&1; then
            cat "$${grant_output}" >&2

            if grep -Eq "PERMISSION_DENIED|IAM_PERMISSION_DENIED" "$${grant_output}"; then
              echo "WARNING: Skipping automatic roles/run.invoker grant because the Cloud Build caller cannot update Cloud Run IAM policies." >&2
              echo "WARNING: Grant serviceAccount:${_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL} roles/run.invoker on ${_WORKER_SERVICE} manually, or rerun with a build service account that can update service IAM." >&2
            else
              exit 1
            fi
          else
            cat "$${grant_output}"
          fi
        fi

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy API
    entrypoint: /bin/bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE_URI="$_AR_HOSTNAME/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA"
        WORKER_URL="$(cat /workspace/worker_url.txt)"
        LABELS="managed-by=gcp-cloud-build-deploy-cloud-run,gcb-trigger-id=${_TRIGGER_ID},gcb-trigger-region=$LOCATION,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID"
        CLOUD_TASKS_AUTH_MODE=token
        EFFECTIVE_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL=
        SERVICE_ACCOUNT_ARGS=()
        SECRET_BINDINGS="INTERNAL_TASK_TOKEN=${_INTERNAL_TASK_TOKEN_SECRET}:latest,DATABASE_URL=${_DATABASE_URL_SECRET}:latest,SECRET_KEY_BASE=${_SECRET_KEY_BASE_SECRET}:latest,GOOGLE_OAUTH_CLIENT_ID=${_GOOGLE_OAUTH_CLIENT_ID_SECRET}:latest,GOOGLE_OAUTH_CLIENT_SECRET=${_GOOGLE_OAUTH_CLIENT_SECRET_SECRET}:latest,ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${_ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY_SECRET}:latest,ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${_ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY_SECRET}:latest,ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${_ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT_SECRET}:latest"

        if [ -n "${_RUNTIME_SERVICE_ACCOUNT}" ]; then
          SERVICE_ACCOUNT_ARGS+=(--service-account="${_RUNTIME_SERVICE_ACCOUNT}")
        fi

        if [ -n "${_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL}" ] && [ "${_WORKER_SERVICE}" != "${_API_SERVICE}" ]; then
          CLOUD_TASKS_AUTH_MODE=oidc
          EFFECTIVE_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL="${_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL}"
        fi

        if [ -n "${_VAPID_PUBLIC_KEY_SECRET}" ] && [ -n "${_VAPID_PRIVATE_KEY_SECRET}" ] && [ -n "${_VAPID_SUBJECT_SECRET}" ]; then
          SECRET_BINDINGS="$${SECRET_BINDINGS},VAPID_PUBLIC_KEY=${_VAPID_PUBLIC_KEY_SECRET}:latest,VAPID_PRIVATE_KEY=${_VAPID_PRIVATE_KEY_SECRET}:latest,VAPID_SUBJECT=${_VAPID_SUBJECT_SECRET}:latest"
        fi

        if [ -n "${_SENTRY_DSN_SECRET}" ]; then
          SECRET_BINDINGS="$${SECRET_BINDINGS},SENTRY_DSN=${_SENTRY_DSN_SECRET}:latest"
        fi

        SECRET_ARGS=(--set-secrets="$${SECRET_BINDINGS}")

        gcloud run deploy "${_API_SERVICE}" \
          --image="$${IMAGE_URI}" \
          --region="${_DEPLOY_REGION}" \
          --platform=managed \
          --allow-unauthenticated \
          --concurrency="${_API_CONCURRENCY}" \
          --cpu="${_API_CPU}" \
          --memory="${_API_MEMORY}" \
          --min-instances="${_API_MIN_INSTANCES}" \
          --max-instances="${_API_MAX_INSTANCES}" \
          --set-env-vars="RAILS_ENV=production,JOB_BACKEND=cloud_tasks,RAILS_LOG_LEVEL=${_RAILS_LOG_LEVEL},FORCE_SSL=${_FORCE_SSL},RAILS_SERVE_STATIC_FILES=${_RAILS_SERVE_STATIC_FILES},ACTIVE_STORAGE_SERVICE=${_ACTIVE_STORAGE_SERVICE},GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_DEPLOY_REGION},GCS_UPLOAD_BUCKET=${_GCS_UPLOAD_BUCKET},OCR_PROVIDER=${_OCR_PROVIDER},OCR_LANGUAGE=${_OCR_LANGUAGE},DEVISE_MAILER_SENDER=${_DEVISE_MAILER_SENDER},GOOGLE_DRIVE_REDIRECT_URI=${_GOOGLE_DRIVE_REDIRECT_URI},CLOUD_TASKS_OCR_QUEUE=${_CLOUD_TASKS_OCR_QUEUE},CLOUD_TASKS_DRIVE_QUEUE=${_CLOUD_TASKS_DRIVE_QUEUE},CLOUD_TASKS_REMINDERS_QUEUE=${_CLOUD_TASKS_REMINDERS_QUEUE},CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL=$${EFFECTIVE_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL},CLOUD_TASKS_AUTH_MODE=$${CLOUD_TASKS_AUTH_MODE},CLOUD_TASKS_HEADER_AUTH_ENABLED=false,WORKER_BASE_URL=$${WORKER_URL},RELEASE_SHA=$COMMIT_SHA" \
          "$${SECRET_ARGS[@]}" \
          --update-labels="$${LABELS}" \
          "$${SERVICE_ACCOUNT_ARGS[@]}" \
          --quiet

images:
  - $_AR_HOSTNAME/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
  - $_AR_HOSTNAME/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest

timeout: 3600s

options:
  requestedVerifyOption: VERIFIED
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _TRIGGER_ID: ea9e283c-4044-42dd-b57f-1a379310fae3
  _DEPLOY_REGION: us-central1
  _AR_HOSTNAME: us-central1-docker.pkg.dev
  _AR_REPOSITORY: cloud-run-source-deploy
  _AR_PROJECT_ID: thoughtbasics
  _IMAGE_NAME: inkcreate
  _SERVICE_NAME: inkcreate-git
  _API_SERVICE: inkcreate-git
  _WORKER_SERVICE: inkcreate-git
  _MIGRATE_JOB: inkcreate-migrate
  _RUNTIME_SERVICE_ACCOUNT: 'inkcreate-runtime@thoughtbasics.iam.gserviceaccount.com'
  _ACTIVE_STORAGE_SERVICE: gcs
  _RAILS_LOG_LEVEL: info
  _FORCE_SSL: 'true'
  _RAILS_SERVE_STATIC_FILES: 'true'
  _OCR_PROVIDER: tesseract
  _OCR_LANGUAGE: eng
