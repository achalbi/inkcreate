<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inkcreate Offline</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, serif;
        background: linear-gradient(180deg, #f7f5ef 0%, #e7e1d2 100%);
        color: #123524;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      section {
        max-width: 420px;
        background: rgba(255, 255, 255, 0.85);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 24px 60px rgba(18, 53, 36, 0.15);
      }

      h1 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>You are offline</h1>
        <p>Draft titles, labels, and queued uploads stay on the device. Inkcreate will retry sending them as soon as the connection comes back.</p>
      </section>
    </main>
  </body>
</html>
